<div class="flex flex-col gap-8">
  <div
    class="w-full rounded-2xl bg-white border border-gray-200 p-6 shadow-sm hover:shadow-md transition-all duration-300"
  >
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="flex items-start gap-4">
        <div
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-bg text-primary"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
            />
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-text-contrast">Appointments Today</p>
          <h3 class="text-2xl font-semibold tracking-tight text-text-contrast">
            {{ countAppointments() }}
            <span class="text-base font-medium text-text-contrast">appointments</span>
          </h3>
        </div>
      </div>

      @if (countAppointments() > 0) {
        <a
          routerLink="/dashboard/appointments"
          class="group inline-flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-medium bg-bg text-primary transition-colors duration-200"
        >
          See more
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 transition-transform duration-200 group-hover:translate-x-0.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </a>
      }
    </div>
  </div>
</div>
